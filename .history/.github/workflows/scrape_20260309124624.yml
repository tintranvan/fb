name: Scrape BunchaTV M3U

on:
  schedule:
    # Chạy mỗi 15 phút
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
      
      - name: Run scraper
        run: python scrape_bunchatv_streams.py
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add bunchatv_streams.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update M3U streams - $(date +'%Y-%m-%d %H:%M:%S')" && git push)

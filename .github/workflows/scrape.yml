name: Scrape FBTV M3U

on:
  schedule:
    # Chạy mỗi 15 phút
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
      
      - name: Run scraper
        run: python scrape_fbtv_streams.py
      
      - name: Check file
        run: |
          echo "Files in directory:"
          ls -la
          if [ -f fbtv_streams.m3u ]; then
            echo "✓ File created"
            head -20 fbtv_streams.m3u
          else
            echo "✗ File not created"
          fi
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f fbtv_streams.m3u ]; then
            git add fbtv_streams.m3u
            git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update M3U streams - $(date +'%Y-%m-%d %H:%M:%S')" && git push)
          else
            echo "⚠️  File fbtv_streams.m3u không được tạo"
          fi
